# Build standalone executables for Windows, macOS, and Linux,
# then publish them as a GitHub Release on every merge to main.

name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Opt in to Node.js 24 for all actions (avoids deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build on each platform ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            binary: addy
            pyinstaller_extra: ""
          - os: windows-latest
            name: windows-amd64
            binary: addy.exe
            pyinstaller_extra: "--noconsole"
          - os: macos-latest      # Apple Silicon (ARM64)
            name: macos-arm64
            binary: addy
            pyinstaller_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --onefile ${{ matrix.pyinstaller_extra }} \
            --name addy \
            --clean \
            addy.py

      - name: Rename binary for platform
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.name }}" == windows-* ]]; then
            mv "${{ matrix.binary }}" "addy-${{ matrix.name }}.exe"
          else
            mv "${{ matrix.binary }}" "addy-${{ matrix.name }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: addy-${{ matrix.name }}
          path: dist/addy-${{ matrix.name }}*
          if-no-files-found: error

  # ── Create a release with all binaries ────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          TAG="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Generated tag: $TAG"

      - name: List release assets
        run: ls -lhR dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Addy ${{ steps.version.outputs.tag }}
          body: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | 🐧 Linux (x86_64) | `addy-linux-amd64` |
            | 🪟 Windows (x86_64) | `addy-windows-amd64.exe` |
            | 🍎 macOS (Apple Silicon) | `addy-macos-arm64` |

            > **macOS users:** After downloading, run `chmod +x addy-macos-arm64` and then right-click → Open to bypass Gatekeeper on first launch.
            >
            > **Linux users:** Run `chmod +x addy-linux-amd64` to make the binary executable.
          generate_release_notes: true
          files: dist/*
